const chars = [...new Set(defis.map(d=>d.char))];
let filtered = defis;
let idx = 0;
let activeChar = "tous";

function buildTabs() {
  const el = document.getElementById('charTabs');
  const items = [{key:"tous",label:"TOUS",suspect:false}].concat(
    chars.map(c => ({key:c, label:c.toUpperCase(), suspect: defis.find(d=>d.char===c)?.suspect||false}))
  );
  el.innerHTML = items.map(i=>
    `<button class="ctab${i.suspect?' suspect':''}${activeChar===i.key?' on':''}" onclick="setChar('${i.key}')">${i.label}</button>`
  ).join('');
}

function setChar(k) {
  activeChar = k;
  filtered = k==="tous" ? defis : defis.filter(d=>d.char===k);
  idx = 0;
  buildTabs();
  render();
}

function move(dir) {
  idx = Math.max(0, Math.min(filtered.length-1, idx+dir));
  render();
}

function toggleSol(id, btn) {
  const el = document.getElementById('sol-'+id);
  el.classList.toggle('vis');
  btn.textContent = el.classList.contains('vis') ? '▼ MASQUER' : '▶ SOLUTION MJ';
}

  const qColors = {Q1:'stag-q1',Q2:'stag-q2',Q3:'stag-q3'};
  const accentColor = d.suspect ? '#ff503c' : '#00ffc8';

  document.getElementById('screen').style.borderColor = d.suspect ? 'rgba(255,80,60,0.35)' : 'rgba(0,255,200,0.25)';

  document.getElementById('screen').innerHTML = `
    <div class="screen-head" style="background:${d.suspect?'rgba(255,80,60,0.06)':'rgba(0,255,200,0.06)'}; border-bottom-color:${d.suspect?'rgba(255,80,60,0.15)':'rgba(0,255,200,0.15)'}">
      <span class="screen-id">${d.id}</span>
      <span class="screen-char">${d.char.toUpperCase()} · ${d.salle}</span>
      <div class="screen-tags">
        <span class="stag ${qColors[d.q]}">${d.q}</span>
        <span class="stag ${d.diff==='easy'?'stag-easy':'stag-hard'}">${d.diff==='easy'?'FACILE':'DIFFICILE'}</span>
        <span class="stag ${d.type==='enigme'?'stag-enig':'stag-gage'}">${d.type==='enigme'?'ÉNIGME':'GAGE'}</span>
      </div>
    </div>
    <div class="screen-body">
      <div class="unit-speech" style="border-left-color:${accentColor}40">
        <p class="unit-speech-label" style="color:${accentColor}60">▶ UNIT-7 dit</p>
        <p class="unit-speech-text">"${d.speech}"</p>
      </div>
      <div class="challenge-box">
        <p class="challenge-label">// DÉFI DE CLEARANCE</p>
        <p class="challenge-text">${d.body.replace(/\n/g,'<br>').replace(/`([^`]+)`/g,'<code>$1</code>')}</p>
      </div>
    </div>
    <div class="screen-foot">
      <button class="sol-btn" onclick="toggleSol('${d.id}',this)">▶ SOLUTION MJ</button>
      <div class="sol-reveal" id="sol-${d.id}">// ${d.sol}</div>
    </div>
  `;

  document.getElementById('counter').textContent = `${idx+1} / ${filtered.length}`;
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').disabled = idx===filtered.length-1;

  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = filtered.map((dd,i)=>
    `<div class="dot${dd.suspect?' suspect-dot':''}${i===idx?' on':''}" onclick="jumpTo(${i})" title="${dd.id}"></div>`
  ).join('');
}

function jumpTo(i) { idx=i; render(); }

buildTabs();
render();
</script>
